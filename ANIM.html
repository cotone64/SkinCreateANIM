<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チェックボックスの合計</title>
</head>
<body>
    <!-- スティーブとアレックスのチェックボックス -->
    <label>
        <input type="radio" name="character" class="calc-checkbox" value="40000"> 
        スティーブ (Steve)
    </label>
    <label>
        <input type="radio" name="character" class="calc-checkbox" value="80000"> 
        アレックス (Alex)
    </label>
    <br>
    
    <!-- 腕や足に関するチェックボックス -->
    <label>
        <input type="checkbox" class="calc-checkbox" value="1"> 
        腕固定 (Arm Fixed)
    </label>
    <label>
        <input type="checkbox" class="calc-checkbox" value="4"> 
        足固定 (Leg Fixed)
    </label>
    <label>
        <input type="checkbox" class="calc-checkbox" value="2"> 
        腕ゾンビ (Zombie Arm)
    </label>
    <br>
    
    <label>
        <input type="checkbox" class="calc-checkbox" value="40"> 
        両腕同じ動き (Both Arms Same Movement)
    </label>
    <label>
        <input type="checkbox" class="calc-checkbox" value="20"> 
        両足同じ動き (Both Legs Same Movement)
    </label>
    <br>
    
    <label>
        <input type="checkbox" class="calc-checkbox" value="80"> 
        グライド (Glide)
    </label>
    <label>
        <input type="checkbox" class="calc-checkbox" value="100"> 
        防具見えない (Invisible Armor)
    </label>
    <label>
        <input type="checkbox" class="calc-checkbox" value="60000"> 
        腰曲がる (Bent Waist)
    </label>
    <label>
        <input type="checkbox" class="calc-checkbox" value="80000000"> 
        逆さま (Upside Down)
    </label>
    <br>
    
    合計: <input type="text" id="total" readonly>

    <script>
        document.querySelectorAll('.calc-checkbox').forEach(cb => {
            cb.addEventListener('change', () => {
                let sum = 0;
                document.querySelectorAll('.calc-checkbox:checked').forEach(checked => {
                    sum += parseInt(checked.value, 10);
                });
                document.getElementById('total').value = sum;
            });
        });
    </script>
</body>
</html>
